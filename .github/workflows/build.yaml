name: CI

on:
  push:
    tags:
      - '*'
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ✅ Format
      run: cargo fmt --all -- --check

    - name: 🔍 Lint
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: 🛠️ Build
      run: cargo build --verbose

    - name: 🧪 Test
      run: cargo test --verbose

  integration-native:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🛠️ Build minimina
      run: cargo build --verbose

    - name: 🔧 Create stub mina binary
      run: |
          mkdir -p /tmp/mina-bin
          cat > /tmp/mina-bin/mina << 'STUB'
          #!/bin/bash
          # Stub mina binary for integration testing
          case "$1" in
            advanced)
              echo "Keypair generated"
              echo "Public key: B62qtest$(head -c 50 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 50)"
              ;;
            libp2p)
              echo "libp2p keypair:CAESQtest$(head -c 50 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 80),12D3KooW$(head -c 30 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | head -c 40)"
              # Create the key file if -privkey-path is given
              for arg in "$@"; do
                if [[ "$prev" == "-privkey-path" ]]; then
                  mkdir -p "$(dirname "$arg")"
                  echo '{"box_primitive":"xsalsa20poly1305","pw_primitive":"argon2i","nonce":"test","pwsalt":"test","pwdiff":[134217728,6],"ciphertext":"test"}' > "$arg"
                  echo '{"box_primitive":"xsalsa20poly1305"}' > "$arg.pub"
                  echo "12D3KooWtest" > "$arg.peerid"
                fi
                prev="$arg"
              done
              ;;
            daemon)
              echo "Mina daemon starting (stub)..."
              # Keep running until killed
              exec sleep infinity
              ;;
            internal)
              echo "Mina internal command (stub)..."
              exec sleep infinity
              ;;
            *)
              echo "Stub mina: unknown command $1"
              exit 0
              ;;
          esac
          STUB
          chmod +x /tmp/mina-bin/mina

    - name: 🧪 Test native mode - topology network
      shell: bash
      run: |
          export PATH="$(pwd)/target/debug:$PATH"

          # Create network from topology (uses pre-existing keys, no mina keygen needed)
          minimina --mode native --bin-path /tmp/mina-bin \
            network create -n test-native \
            -t tests/data/small_network/topology.json \
            -g tests/data/small_network/genesis_ledger.json

          # Verify network was created
          minimina network info -n test-native
          minimina network list

          # Start the network (spawns stub mina processes)
          minimina --mode native --bin-path /tmp/mina-bin \
            network start -n test-native

          # Check logs exist
          minimina --mode native --bin-path /tmp/mina-bin \
            node logs -i seed-0 -n test-native -r

          # Stop the network
          minimina --mode native --bin-path /tmp/mina-bin \
            network stop -n test-native

          # Delete the network
          minimina --mode native --bin-path /tmp/mina-bin \
            network delete -n test-native

          echo "Native mode integration test passed!"

  integration-docker:
    if: ${{ false }} # Disabled: requires self-hosted runners with mina Docker images
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🪄 Extract reference name
      id: extract_ref
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          REF_NAME=${{ github.head_ref }}
        else
          REF_NAME=$(echo ${GITHUB_REF#refs/*/})
        fi
        echo "Extracted reference name: $REF_NAME"
        echo "ref=$REF_NAME" >> $GITHUB_OUTPUT

    - name: 🤌 Get MiniMina from source
      uses: o1-labs/install-minimina-action@v1
      with:
        commit_or_branch: ${{ steps.extract_ref.outputs.ref }}
        repository: ${{ github.repository }}

    - name: 🧪 Test default network
      shell: bash
      run: |
          minimina network create
          minimina network start
          minimina network status
          minimina network info
          minimina node stop -i mina-bp-1
          minimina node start -i mina-bp-1
          minimina network stop
          minimina network delete

    - name: 🧪 Test network from topology
      shell: bash
      run: |
          cd minimina
          minimina network create -n large -t tests/data/large_network/topology.json -g tests/data/large_network/genesis_ledger.json
          minimina network start -n large
          minimina network status -n large
          minimina network info -n large
          minimina node stop -n large -i empty_node-1
          minimina node start -n large -i empty_node-1
          minimina network stop -n large
          minimina network delete -n large

  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    runs-on: ubuntu-latest
    environment: package

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 📦 Package
      run: |
          cargo install cargo-deb
          cargo deb

    - name: 📤 Upload
      env:
        ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
        SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS_KEY }}
      run: |
          sudo apt-get update
          sudo apt-get install -y rubygems locales
          sudo gem install deb-s3

          sudo locale-gen en_US.UTF-8
          export LANG=en_US.UTF-8
          export LANGUAGE=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          deb-s3 upload --s3-region=us-west-2 --bucket packages.o1test.net --lock --preserve-versions --access-key-id=$ACCESS_KEY_ID --secret-access-key=$SECRET_ACCESS_KEY --cache-control=max-age=120 --component stable --codename noble ./target/debian/*.deb
